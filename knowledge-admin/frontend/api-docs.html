<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Documentation Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; background: #fafafa; }
  h1 { font-size: 24px; border-bottom: 2px solid #4CAF50; padding-bottom: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; transition: box-shadow .2s; }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.1); }
  .card h3 { font-size: 16px; margin-bottom: 4px; }
  .card .port { font-size: 12px; color: #999; margin-bottom: 8px; }
  .card .desc { font-size: 14px; color: #666; margin-bottom: 12px; }
  .links a { display: inline-block; padding: 6px 14px; margin-right: 8px; border-radius: 4px; font-size: 13px; font-weight: 500; text-decoration: none; }
  .links .swagger { background: #E8F5E9; color: #2E7D32; }
  .links .swagger:hover { background: #C8E6C9; }
  .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #ccc; }
  .status.up { background: #4CAF50; }
  .status.down { background: #f44336; }
</style>
</head>
<body>
<h1>API Documentation Hub</h1>
<div class="grid">
  <div class="card" id="card-admin">
    <h3><span class="status" id="s-admin"></span>Knowledge Admin API</h3>
    <div class="port">Port 8000</div>
    <div class="desc">知識管理後台 — 認證、管理員、角色、知識 CRUD</div>
    <div class="links">
      <a class="swagger" href="//localhost:8000/docs" target="_blank">Swagger UI</a>
    </div>
  </div>
  <div class="card" id="card-rag">
    <h3><span class="status" id="s-rag"></span>RAG Orchestrator API</h3>
    <div class="port">Port 8100</div>
    <div class="desc">RAG 協調器 — Chat、知識檢索、回測、迴圈管理</div>
    <div class="links">
      <a class="swagger" href="//localhost:8100/docs" target="_blank">Swagger UI</a>
    </div>
  </div>
  <div class="card" id="card-embedding">
    <h3><span class="status" id="s-embedding"></span>Embedding API</h3>
    <div class="port">Port 5001</div>
    <div class="desc">向量嵌入服務 — 文本向量化</div>
    <div class="links">
      <a class="swagger" href="//localhost:5001/docs" target="_blank">Swagger UI</a>
    </div>
  </div>
  <div class="card" id="card-semantic">
    <h3><span class="status" id="s-semantic"></span>Semantic Model API</h3>
    <div class="port">Port 8002</div>
    <div class="desc">語意模型服務 — 意圖分類、語意分析</div>
    <div class="links">
      <a class="swagger" href="//localhost:8002/docs" target="_blank">Swagger UI</a>
    </div>
  </div>
</div>
<script>
  // Health check for each service
  const services = [
    { id: 's-admin', url: 'http://localhost:8000/openapi.json' },
    { id: 's-rag', url: 'http://localhost:8100/openapi.json' },
    { id: 's-embedding', url: 'http://localhost:5001/openapi.json' },
    { id: 's-semantic', url: 'http://localhost:8002/openapi.json' },
  ];
  services.forEach(s => {
    fetch(s.url, { mode: 'no-cors' })
      .then(() => document.getElementById(s.id).classList.add('up'))
      .catch(() => document.getElementById(s.id).classList.add('down'));
  });
</script>
</body>
</html>
