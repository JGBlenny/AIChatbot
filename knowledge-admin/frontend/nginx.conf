server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 檔案上傳大小限制（用於 Excel 匯入等功能）
    client_max_body_size 100M;

    # 上游用「變數」強制每次經 Docker DNS 動態解析（valid=10s）——
    # 否則 nginx 啟動時解析一次就快取死，上游容器重啟換 IP 後全部 502，
    # 得跟著重啟本容器才會好。
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api/ {
        set $admin_api http://knowledge-admin-api:8000;
        proxy_pass $admin_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== 集中 API 文件入口 =====
    location = /api-docs {
        default_type text/html;
        alias /usr/share/nginx/api-docs.html;
    }

    # RAG Orchestrator API 代理 (Phase 1: Multi-Vendor)
    # 前端請求 /rag-api/v1/xxx -> 後端 /api/v1/xxx
    location /rag-api/ {
        # set 必須在 rewrite...break 之前（break 會中止 rewrite 階段後續指令）
        set $rag_api http://rag-orchestrator:8100;
        rewrite ^/rag-api/(.*)$ /api/$1 break;
        proxy_pass $rag_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 串流支援（禁用 buffering，確保即時傳送）
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # AI 轉換超時設定（規格書轉換可能需要較長時間）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
