[pytest]
# spec testing-traceability 元件 1（R1.1, R2.1–2.4, D3）
# 統一測試設定；rootdir 為 rag-orchestrator/，源碼（services/、routers/）即可被匯入。
testpaths = tests
asyncio_mode = auto
addopts = --strict-markers
markers =
    unit: 純函式／mock，無外部相依，<1s（CI 主力、可離線）
    integration: 真實 DB／跨模組，不經 HTTP（CI 無相依時標示略過）
    e2e: 經 /api/v1/message 或 SSE，需整服務（CI 標示略過）
    req(id): 宣告本測試驗證的需求 ID，如 req("testing-traceability:5.2")（追溯用，D3）
