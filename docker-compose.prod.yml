# 生產環境完整配置
# 使用方式: docker-compose -f docker-compose.prod.yml up -d
#
# 特點：
# - 完整的服務定義，不需要合併 docker-compose.yml
# - knowledge-admin-web 使用預構建的 dist 目錄（僅綁定 80 端口）
# - 移除開發環境的代碼熱重載
# - 移除 pgAdmin（生產環境不需要）
#
# 前置步驟：
# 1. 在本地構建前端：
#    cd knowledge-admin/frontend
#    npm install
#    npm run build
# 2. 上傳整個項目到伺服器（包含 dist 目錄）
# 3. 設置環境變數（.env 文件）
# 4. 執行: docker-compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL 資料庫 with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aichatbot-postgres
    environment:
      TZ: Asia/Taipei
      POSTGRES_USER: aichatbot
      POSTGRES_PASSWORD: aichatbot_password
      POSTGRES_DB: aichatbot_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aichatbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (用於緩存和任務隊列)
  redis:
    image: redis:7-alpine
    container_name: aichatbot-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Embedding API Service
  embedding-api:
    build: ./embedding-service
    container_name: aichatbot-embedding-api
    environment:
      TZ: Asia/Taipei
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5001:5000"
    depends_on:
      - redis
    restart: unless-stopped

  # 知識庫管理後台 - API
  knowledge-admin-api:
    build: ./knowledge-admin/backend
    container_name: aichatbot-knowledge-admin-api
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aichatbot_admin
      DB_USER: aichatbot
      DB_PASSWORD: aichatbot_password
      EMBEDDING_API_URL: http://embedding-api:5000/api/v1/embeddings
      PROJECT_ROOT: /app
      RAG_API_URL: http://rag-orchestrator:8100
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      # 生產環境：只掛載必要的數據目錄和腳本
      - ./knowledge-admin/backend/create_admin.py:/app/create_admin.py:ro
      - ./test_scenarios_smoke.xlsx:/app/test_scenarios_smoke.xlsx:ro
      - ./test_scenarios_full.xlsx:/app/test_scenarios_full.xlsx:ro
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
      # Mount docker socket for running backtest in rag-orchestrator container
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - embedding-api
      - rag-orchestrator
    restart: unless-stopped

  # 知識庫管理後台 - 前端（生產模式）
  knowledge-admin-web:
    image: nginx:alpine
    container_name: aichatbot-knowledge-admin-web
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "${WEB_PORT:-80}:80"  # 本地用 8087，線上用 80（透過 .env 設定）
    volumes:
      - ./knowledge-admin/frontend/dist:/usr/share/nginx/html:ro
      - ./knowledge-admin/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./knowledge-admin/frontend/api-docs.html:/usr/share/nginx/api-docs.html:ro
    depends_on:
      - knowledge-admin-api
    restart: unless-stopped

  # RAG Orchestrator
  rag-orchestrator:
    build: ./rag-orchestrator
    container_name: aichatbot-rag-orchestrator
    environment:
      TZ: Asia/Taipei
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # 意圖分類器配置
      INTENT_CLASSIFIER_MODEL: ${INTENT_CLASSIFIER_MODEL:-gpt-3.5-turbo}
      INTENT_CLASSIFIER_TEMPERATURE: ${INTENT_CLASSIFIER_TEMPERATURE:-0.1}
      INTENT_CLASSIFIER_MAX_TOKENS: ${INTENT_CLASSIFIER_MAX_TOKENS:-500}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aichatbot_admin
      DB_USER: aichatbot
      DB_PASSWORD: aichatbot_password
      EMBEDDING_API_URL: http://embedding-api:5000/api/v1/embeddings
      KNOWLEDGE_GEN_MODEL: ${KNOWLEDGE_GEN_MODEL:-gpt-3.5-turbo}
      DOCUMENT_CONVERTER_MODEL: ${DOCUMENT_CONVERTER_MODEL:-gpt-4o}
      # Redis 緩存配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_QUESTION: ${CACHE_TTL_QUESTION:-3600}
      CACHE_TTL_VECTOR: ${CACHE_TTL_VECTOR:-7200}
      CACHE_TTL_RAG_RESULT: ${CACHE_TTL_RAG_RESULT:-1800}
      # LLM 答案合成配置
      # 分數欄位語意（詳見 docs/architecture/retriever-pipeline.md）：
      #   vector_similarity = 純向量 cosine；similarity = final 組合分數（含 rerank/boost）
      # JGB 系統 API
      JGB_API_BASE_URL: ${JGB_API_BASE_URL:-https://stage.jgbsmart.com}
      JGB_API_KEY: ${JGB_API_KEY:-}
      USE_MOCK_JGB_API: ${USE_MOCK_JGB_API:-true}
      ENABLE_ANSWER_SYNTHESIS: ${ENABLE_ANSWER_SYNTHESIS:-true}
      SYNTHESIS_THRESHOLD: ${SYNTHESIS_THRESHOLD:-0.99}  # 比對 final similarity（_should_synthesize 合成觸發判定）
      PERFECT_MATCH_THRESHOLD: ${PERFECT_MATCH_THRESHOLD:-0.90}  # 比對 vector_similarity（純向量分數）— 重構後閾值語意改變，需校準
      SYNTHESIS_MIN_RESULTS: ${SYNTHESIS_MIN_RESULTS:-2}
      SYNTHESIS_MAX_RESULTS: ${SYNTHESIS_MAX_RESULTS:-3}
      SOP_SIMILARITY_SCORE: ${SOP_SIMILARITY_SCORE:-0.70}
      # RAG 檢索配置 - ✅ 選項1：統一檢索閾值（移除獨立 RAG fallback）
      SOP_SIMILARITY_THRESHOLD: ${SOP_SIMILARITY_THRESHOLD:-0.75}  # 比對 final similarity（application 端過濾 SOP 候選）
      KB_SIMILARITY_THRESHOLD: 0.65  # 比對 final similarity（application 端過濾知識庫候選，涵蓋原 fallback 範圍）
      HIGH_QUALITY_THRESHOLD: ${HIGH_QUALITY_THRESHOLD:-0.8}  # 比對 final similarity（高品質判定，用於答案合成觸發）
      FALLBACK_SIMILARITY_THRESHOLD: 0.55  # ⚠️ 已廢棄：RAG Fallback 已移除，統一使用 KB_SIMILARITY_THRESHOLD
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.6}  # ⚠️ 已廢棄：待移除
      RAG_TOP_K: ${RAG_TOP_K:-5}
      # 信心度評估配置
      CONFIDENCE_HIGH_THRESHOLD: ${CONFIDENCE_HIGH_THRESHOLD:-0.85}
      CONFIDENCE_MEDIUM_THRESHOLD: ${CONFIDENCE_MEDIUM_THRESHOLD:-0.70}
      # 知識優先級配置
      PRIORITY_BOOST: ${PRIORITY_BOOST:-0.15}
      PRIORITY_QUALITY_THRESHOLD: ${PRIORITY_QUALITY_THRESHOLD:-0.70}
      # 質量評估配置
      QUALITY_EVALUATION_ENABLED: ${QUALITY_EVALUATION_ENABLED:-true}
      QUALITY_EVALUATION_THRESHOLD: ${QUALITY_EVALUATION_THRESHOLD:-6}
      # Semantic Reranker 效能調校（見 .kiro/issues/reranker-returning-zero.md）
      # bge-reranker-base CPU 推論大批次慢，以下參數避免 client timeout
      RERANKER_INPUT_LIMIT: ${RERANKER_INPUT_LIMIT:-20}                        # 送進 reranker 的候選數上限
      RERANKER_MIN_VECTOR_SIMILARITY: ${RERANKER_MIN_VECTOR_SIMILARITY:-0.3}   # vector 下限（過濾不可能進 top_k 的低分）
      RERANKER_HTTP_TIMEOUT: ${RERANKER_HTTP_TIMEOUT:-60}                      # HTTP client timeout（秒）
      # 條件式優化配置
      FAST_PATH_THRESHOLD: ${FAST_PATH_THRESHOLD:-0.75}
      TEMPLATE_MIN_SCORE: ${TEMPLATE_MIN_SCORE:-0.55}
      TEMPLATE_MAX_SCORE: ${TEMPLATE_MAX_SCORE:-0.75}
      LLM_PARAM_INJECTION_TEMP: ${LLM_PARAM_INJECTION_TEMP:-0.1}
      LLM_SYNTHESIS_TEMP: ${LLM_SYNTHESIS_TEMP:-0.1}
      # 意圖建議配置
      INTENT_SUGGESTION_TEMP: ${INTENT_SUGGESTION_TEMP:-0.2}
      INTENT_SUGGESTION_MAX_TOKENS: ${INTENT_SUGGESTION_MAX_TOKENS:-800}
      # 知識生成配置
      KNOWLEDGE_GEN_TEMPERATURE: ${KNOWLEDGE_GEN_TEMPERATURE:-0.7}
      KNOWLEDGE_GEN_MAX_TOKENS: ${KNOWLEDGE_GEN_MAX_TOKENS:-800}
      # LLM 答案優化配置
      LLM_ANSWER_TEMPERATURE: ${LLM_ANSWER_TEMPERATURE:-0.7}
      LLM_ANSWER_MAX_TOKENS: ${LLM_ANSWER_MAX_TOKENS:-400}
      # 未釐清問題配置
      UNCLEAR_SEMANTIC_THRESHOLD: ${UNCLEAR_SEMANTIC_THRESHOLD:-0.80}
      UNCLEAR_PINYIN_THRESHOLD: ${UNCLEAR_PINYIN_THRESHOLD:-0.80}
      # AWS S3 影片儲存配置
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      # Query Rewriting（查詢改寫）
      ENABLE_QUERY_REWRITE: ${ENABLE_QUERY_REWRITE:-false}
      QUERY_REWRITE_MODEL: ${QUERY_REWRITE_MODEL:-gpt-3.5-turbo}
      # Reranker 配置（2026-01-28）
      ENABLE_RERANKER: ${ENABLE_RERANKER:-true}
      ENABLE_KNOWLEDGE_RERANKER: ${ENABLE_KNOWLEDGE_RERANKER:-true}
      # 語義重排序配置（2026-02-06）
      USE_SEMANTIC_RERANK: ${USE_SEMANTIC_RERANK:-true}
      SEMANTIC_MODEL_API_URL: http://semantic-model:8000
      # 表單觸發配置
      FORM_TRIGGER_THRESHOLD: ${FORM_TRIGGER_THRESHOLD:-0.75}
      # 回測系統配置
      BACKTEST_BASE_URL: ${BACKTEST_BASE_URL:-http://rag-orchestrator:8100}
    ports:
      - "8100:8100"
    depends_on:
      - postgres
      - embedding-api
      - redis
      - semantic-model
    restart: unless-stopped

  # 語義重排序模型服務（2026-02-06）
  semantic-model:
    build: ./semantic_model
    container_name: aichatbot-semantic-model
    ports:
      - "8002:8000"
    environment:
      TZ: Asia/Taipei
      MODEL_NAME: BAAI/bge-reranker-base
      MAX_LENGTH: 512
      BATCH_SIZE: 32
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
